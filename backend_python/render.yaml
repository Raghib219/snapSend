services:
  - type: web
    name: snapspend-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false
